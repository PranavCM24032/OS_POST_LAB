<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Lift SCAN | Smart Elevator Optimizer</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Sidebar: Controls and Inputs -->
        <aside class="sidebar">
            <header>
                <div class="logo">
                    <span class="logo-icon">🏢</span>
                    <h1>Multi-Lift SCAN</h1>
                </div>
                <p class="subtitle">Distributed ETA Lift Scheduling</p>
                <div class="badge">Local JS Engine</div>
            </header>

            <div class="input-panel">
                <div class="input-group">
                    <label for="maxFloors">Total Building Floors</label>
                    <input type="number" id="maxFloors" value="50" min="1">
                </div>

                <div class="lift-config-group">
                    <h4 class="lift-a-title">Lift A Config</h4>
                    <div class="config-row">
                        <div class="input-group">
                            <label>Floor</label>
                            <input type="number" id="initialPosA" value="10" min="0">
                        </div>
                        <div class="input-group">
                            <label>Direction</label>
                            <div class="direction-toggle" id="dirToggleA">
                                <button class="active" data-dir="UP">UP 🔼</button>
                                <button data-dir="DOWN">DOWN 🔽</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="lift-config-group">
                    <h4 class="lift-b-title">Lift B Config</h4>
                    <div class="config-row">
                        <div class="input-group">
                            <label>Floor</label>
                            <input type="number" id="initialPosB" value="40" min="0">
                        </div>
                        <div class="input-group">
                            <label>Direction</label>
                            <div class="direction-toggle" id="dirToggleB">
                                <button data-dir="UP">UP 🔼</button>
                                <button class="active" data-dir="DOWN">DOWN 🔽</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="input-group">
                    <label for="requests">Global Floor Requests</label>
                    <textarea id="requests" rows="3">5, 25, 42, 12, 33, 48, 2, 18</textarea>
                </div>
                
                <button id="optimizeBtn" class="primary-btn">Sync & Optimize</button>
                <p id="statusMsg" class="status-msg">Ready to Optimize</p>
            </div>
        </aside>

        <!-- Main Dashboard: Visualization and Results -->
        <main class="dashboard">
            <section class="stat-grid">
                <div class="stat-card" style="border-left-color: var(--lift-a-color);">
                    <span class="stat-label">Lift A Distance</span>
                    <span class="stat-value" id="distAVal">0</span>
                    <div class="efficiency-pct" style="color:var(--lift-a-color)">Seq: <span id="seqA">-</span></div>
                </div>
                <div class="stat-card" style="border-left-color: var(--lift-b-color);">
                    <span class="stat-label">Lift B Distance</span>
                    <span class="stat-value" id="distBVal">0</span>
                    <div class="efficiency-pct" style="color:var(--lift-b-color)">Seq: <span id="seqB">-</span></div>
                </div>
                <div class="stat-card" style="border-left-color: var(--accent-primary);">
                    <span class="stat-label">Total System Distance</span>
                    <span class="stat-value" id="totalDistVal">0</span>
                    
                </div>
            </section>

            <section class="visualizer-container">
                <div class="building-shaft">
                    <div class="floor-markers" id="floorMarkers"></div>
                    
                    <div class="lift-shaft" id="shaftA">
                        <div class="path-trace"></div>
                        <div class="lift-car lift-a" id="liftCarA">
                            <div class="lift-display">10</div>
                        </div>
                    </div>

                    <div class="lift-shaft" id="shaftB">
                        <div class="path-trace"></div>
                        <div class="lift-car lift-b" id="liftCarB">
                            <div class="lift-display">40</div>
                        </div>
                    </div>
                </div>
                
                <div class="comparison-chart">
                    <canvas id="distChart"></canvas>
                </div>
            </section>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>
